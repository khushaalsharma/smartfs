version: '3.8'

services:
  app:
    build: .
    container_name: smartfs-spring-app
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
